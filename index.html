<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f8f7f5">
  <title>Wardrobe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="header" id="header">
    <div class="header-top">
      <div class="app-logo">
        <div class="app-logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.84H5v10a2 2 0 002 2h10a2 2 0 002-2V10h1.15a1 1 0 00.99-.84l.58-3.57a2 2 0 00-1.34-2.23z"/>
          </svg>
        </div>
        <span class="app-name">Wardrobe</span>
      </div>
      <span class="header-count" id="header-count">0 items</span>
    </div>
    <div class="category-bar" id="cat-bar">
      <button class="pill active" data-cat="all">All</button>
      <button class="pill" data-cat="tops">Tops</button>
      <button class="pill" data-cat="pants">Pants</button>
      <button class="pill" data-cat="skirts">Skirts</button>
      <button class="pill" data-cat="dresses">Dresses</button>
      <button class="pill" data-cat="shoes">Shoes</button>
      <button class="pill" data-cat="accessories">Accessories</button>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────── -->
  <main class="main" id="main">

    <!-- Closet View -->
    <div id="view-closet">
      <div class="closet-grid" id="closet-grid"></div>
      <div class="empty-state" id="empty-state" style="display:none">
        <span class="empty-icon">👗</span>
        <h3>Your closet is empty</h3>
        <p>Tap <strong>+</strong> to add your first item</p>
      </div>
    </div>

    <!-- Calendar View -->
    <div id="view-calendar" style="display:none">
      <div class="cal-nav">
        <button class="cal-nav-btn" id="cal-prev">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="cal-month" id="cal-month"></span>
        <button class="cal-nav-btn" id="cal-next">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>
      <div class="cal-weekdays">
        <div class="wd">S</div><div class="wd">M</div><div class="wd">T</div>
        <div class="wd">W</div><div class="wd">T</div><div class="wd">F</div><div class="wd">S</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

  </main>

  <!-- ── Bottom Nav ──────────────────────────────────────── -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-closet">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.84H5v10a2 2 0 002 2h10a2 2 0 002-2V10h1.15a1 1 0 00.99-.84l.58-3.57a2 2 0 00-1.34-2.23z"/>
      </svg>
      <span>Closet</span>
    </button>
    <button class="nav-add" id="nav-add">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
    <button class="nav-btn" id="nav-cal">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span>OOTD</span>
    </button>
  </nav>
</div>

<!-- ── Add Item Sheet ──────────────────────────────────── -->
<div class="overlay" id="ov-add">
  <div class="sheet">
    <div class="sheet-drag"></div>
    <div class="sheet-head">
      <h2 class="sheet-title">Add Item</h2>
      <button class="sheet-x" id="add-close">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="sheet-body">
      <div class="fg">
        <label class="fl">Photo</label>
        <div class="img-upload" id="upload-area">
          <div class="upload-hint" id="upload-hint">
            <span class="upload-hint-icon">📷</span>
            <p>Tap to upload or drag & drop</p>
            <small>Paste transparent PNG with ⌘V / Ctrl+V</small>
          </div>
          <div class="proc-overlay" id="proc-overlay">
            <div class="spinner"></div>
            <div class="proc-label" id="proc-label">Processing…</div>
            <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar"></div></div>
          </div>
        </div>
        <input type="file" id="file-input" accept="image/*" style="display:none">
        <button class="btn btn-secondary" id="rm-bg-btn" style="display:none">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-.93-6.63-.82-8.94 0-2.58.92-5.01 2.86-7.44 6.32"/>
          </svg>
          Remove Background (AI)
        </button>
        <p class="bg-note" id="bg-note"></p>
      </div>

      <div class="fg">
        <label class="fl" for="i-name">Name</label>
        <input class="fi" id="i-name" type="text" placeholder="e.g. White linen shirt">
      </div>

      <div class="fg">
        <label class="fl">Category</label>
        <div class="cat-select" id="form-cats">
          <button class="cat-pill" data-cat="tops">Tops</button>
          <button class="cat-pill" data-cat="pants">Pants</button>
          <button class="cat-pill" data-cat="skirts">Skirts</button>
          <button class="cat-pill" data-cat="dresses">Dresses</button>
          <button class="cat-pill" data-cat="shoes">Shoes</button>
          <button class="cat-pill" data-cat="accessories">Accessories</button>
        </div>
      </div>

      <div class="fg">
        <label class="fl" for="i-brand">Brand</label>
        <input class="fi" id="i-brand" type="text" placeholder="e.g. Zara, H&M, Uniqlo">
      </div>

      <div class="form-row">
        <div class="fg">
          <label class="fl" for="i-price">Price</label>
          <input class="fi" id="i-price" type="number" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="fg">
          <label class="fl" for="i-pdate">Purchase Date</label>
          <input class="fi" id="i-pdate" type="date">
        </div>
      </div>

      <div class="fg">
        <label class="fl" for="i-washed">Last Washed</label>
        <input class="fi" id="i-washed" type="date">
      </div>

      <div class="fg">
        <label class="fl" for="i-notes">Notes</label>
        <input class="fi" id="i-notes" type="text" placeholder="Color, material, fit notes…">
      </div>

      <button class="btn btn-primary" id="save-item">Save to Closet</button>
    </div>
  </div>
</div>

<!-- ── Item Detail Sheet ───────────────────────────────── -->
<div class="overlay" id="ov-detail">
  <div class="sheet">
    <div class="sheet-drag"></div>
    <div class="sheet-head">
      <h2 class="sheet-title" id="detail-title">Item</h2>
      <button class="sheet-x" id="detail-close">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="sheet-body">
      <div id="detail-img-wrap"></div>
      <div class="meta-grid">
        <div class="meta-card"><div class="meta-label">Brand</div><div class="meta-val" id="d-brand">—</div></div>
        <div class="meta-card"><div class="meta-label">Category</div><div class="meta-val" id="d-cat">—</div></div>
        <div class="meta-card"><div class="meta-label">Price</div><div class="meta-val" id="d-price">—</div></div>
        <div class="meta-card"><div class="meta-label">Purchased</div><div class="meta-val" id="d-pdate">—</div></div>
        <div class="meta-card"><div class="meta-label">Last Washed</div><div class="meta-val" id="d-washed">—</div></div>
        <div class="meta-card"><div class="meta-label">Notes</div><div class="meta-val" id="d-notes">—</div></div>
      </div>
      <button class="btn btn-danger" id="del-item">Delete Item</button>
    </div>
  </div>
</div>

<!-- ── OOTD Sheet ──────────────────────────────────────── -->
<div class="overlay" id="ov-ootd">
  <div class="sheet">
    <div class="sheet-drag"></div>
    <div class="sheet-head">
      <h2 class="sheet-title">Outfit of the Day</h2>
      <button class="sheet-x" id="ootd-close">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="sheet-body">
      <p class="ootd-date" id="ootd-date-lbl"></p>
      <div class="ootd-section-label">Wearing today</div>
      <div class="ootd-outfit-grid" id="ootd-outfit"></div>
      <div class="ootd-section-label">Pick from closet</div>
      <div class="ootd-closet-grid" id="ootd-closet"></div>
      <button class="btn btn-primary" id="save-ootd" style="margin-top:16px">Save Outfit</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script type="module" src="app.js"></script>
</body>
</html>
